  <main class="container" style="padding:16px;max-width:1100px;margin:0 auto;">

      <a class="btn tiny" href="atlas.html" aria-label="返回图谱首页">← 返回图谱首页</a>
    </div>
    <section class="card" style="padding:20px;">
      <h1 id="atlasTopicTitle" style="margin:0 0 6px 0;">专题</h1>

      <div id="atlasTopicStats" class="small muted" style="margin-top:8px;"></div>

    <!-- 粘性章节目录 (滚动到顶部时贴着) -->
    <div id="atlasTopicToc" style="position:sticky;top:0;z-index:50;margin-top:14px;background:var(--bg,#0a0e1a);backdrop-filter:blur(8px);padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06);"></div>
    <!-- 按系列分组的章节 -->
    <div id="atlasTopicSections"></div>
