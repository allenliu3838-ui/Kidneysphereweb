<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>视频库 · 肾域</title>
  <meta name="description" content="肾域 — 面向肾脏专科的学术社区、临床科研与医生工具平台">
  <link rel="icon" href="assets/logo.png" />
  <link rel="stylesheet" href="styles.css?v=20260213_001" />
  <style>
    /* ── Video page specific styles ── */
    .filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .filter-bar .filter-group{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
    .filter-bar .filter-label{font-size:13px;font-weight:600;color:var(--text-muted,#888);white-space:nowrap}
    .filter-bar .sep{width:1px;height:20px;background:var(--border,#333);margin:0 4px}

    .specialty-section{margin-top:24px}
    .specialty-header{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:12px}
    .specialty-header h3{margin:0;font-size:16px}
    .specialty-header .count{font-size:13px;color:var(--text-muted,#888);margin-left:6px}
    .specialty-header .expand-btn{font-size:13px;cursor:pointer;background:none;border:none;color:var(--accent,#a855f7);padding:4px 8px}
    .specialty-header .expand-btn:hover{text-decoration:underline}

    .video-grid-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}

    /* Access-level badges */
    .badge-free{border-color:rgba(34,197,94,.5);background:rgba(34,197,94,.1);color:#4ade80}
    .badge-member{border-color:rgba(168,85,247,.5);background:rgba(168,85,247,.1);color:#c084fc}
    .badge-training{border-color:rgba(63,131,248,.5);background:rgba(63,131,248,.1);color:#60a5fa}
    .badge-purchased{border-color:rgba(34,197,94,.5);background:rgba(34,197,94,.1);color:#4ade80}
    .badge-source{border-color:rgba(251,191,36,.4);background:rgba(251,191,36,.08);color:#fbbf24;font-size:11px}

    /* Video card */
    .vcard{padding:14px 16px;border-radius:12px;background:var(--card-bg,rgba(255,255,255,.04));border:1px solid var(--border,#222)}
    .vcard .vcard-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;flex-wrap:wrap}
    .vcard h4{margin:0;font-size:14px;font-weight:600;line-height:1.4}
    .vcard .vcard-meta{font-size:12px;color:var(--text-muted,#888);margin-top:4px}
    .vcard .vcard-badges{display:flex;gap:4px;flex-wrap:wrap;flex-shrink:0}
    .vcard .vcard-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}

    /* Search box */
    .search-box{padding:8px 12px;border-radius:8px;border:1px solid var(--border,#333);background:var(--input-bg,rgba(255,255,255,.06));color:inherit;font-size:14px;width:100%;max-width:320px}
    .search-box::placeholder{color:var(--text-muted,#666)}

    /* Modal overlay */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
    .modal-overlay.active{opacity:1;pointer-events:auto}
    .modal-box{background:var(--bg,#181818);border:1px solid var(--border,#333);border-radius:16px;padding:24px;max-width:420px;width:100%;position:relative}
    .modal-box h3{margin:0 0 8px}
    .modal-box .close-btn{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--text-muted,#888);font-size:20px;cursor:pointer;padding:4px 8px;line-height:1}
    .modal-box .close-btn:hover{color:var(--text,#eee)}
    .modal-box .modal-actions{display:flex;flex-direction:column;gap:10px;margin-top:16px}
    .modal-box .modal-actions a{text-align:center}
  </style>
</head>
<body>
  <header class="nav"></header>

  <main>

<section class="hero">
  <div class="container">
    <div class="card">
      <span class="badge">视频库</span>
      <h2 style="margin-top:10px">视频库</h2>
      <p class="small">
        浏览全部视频课程 — 免费内容注册即看，会员和培训内容购买后解锁。
      </p>

      <div id="loginHint" class="note" style="margin-top:12px">
        正在检测登录状态…
      </div>

      <!-- 升级引导模块（免费注册用户可见，有权益后自动隐藏） -->
      <div id="upgradeModule" style="margin-top:14px;display:none">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div style="padding:14px 16px;background:rgba(168,85,247,.08);border:1px solid rgba(168,85,247,.25);border-radius:12px">
            <div style="font-weight:600;font-size:14px">GlomCon 教育会员</div>
            <div class="small muted" style="margin-top:3px">¥199/年 · 解锁全部 GlomCon 中国教育系列视频</div>
            <div style="margin-top:10px"><a class="btn primary" href="checkout.html?product=MEMBERSHIP-YEARLY">立即开通</a></div>
          </div>
          <div style="padding:14px 16px;background:rgba(63,131,248,.08);border:1px solid rgba(63,131,248,.25);border-radius:12px">
            <div style="font-weight:600;font-size:14px">专科培训项目</div>
            <div class="small muted" style="margin-top:3px">¥780 起 · 系统化课程 + 直播互动 + 学习群 + 回放</div>
            <div style="margin-top:10px"><a class="btn" href="academy.html#training-projects">查看培训项目</a></div>
          </div>
        </div>
      </div>

      <div class="hr"></div>

      <!-- Filter bar: search + access level + source -->
      <div style="display:flex;flex-direction:column;gap:12px">
        <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between">
          <input type="text" id="searchBox" class="search-box" placeholder="搜索视频标题或讲师…" />
          <div style="display:flex;gap:10px;flex-wrap:wrap">
            <a class="btn" href="academy.html">培训与定价</a>
            <a class="btn" href="my-learning.html">我的学习</a>
          </div>
        </div>
        <div class="filter-bar">
          <span class="filter-label">付费级别</span>
          <div id="accessPills" class="filter-group"></div>
          <div class="sep"></div>
          <span class="filter-label">内容来源</span>
          <div id="sourcePills" class="filter-group"></div>
        </div>
      </div>

      <div class="hr"></div>

      <!-- Grouped video sections -->
      <div id="videoSections"></div>

      <div class="hr"></div>

      <div class="note small">
        <b>版权与合规：</b>本站仅做"链接整理与学习索引"，不存储/搬运视频内容。
        <span data-admin-only hidden><br/>管理员提示：如需更新静态清单，可编辑 <code>assets/videos.js</code>；也可在学习中心的"管理员：新增视频"中添加到数据库。</span>
      </div>
    </div>
  </div>
</section>

<!-- Payment prompt modal -->
<div id="payModal" class="modal-overlay">
  <div class="modal-box">
    <button class="close-btn" id="payModalClose">&times;</button>
    <div id="payModalContent"></div>
  </div>
</div>

<script type="module">
  import { supabase, ensureSupabase, isConfigured, getCurrentUser, toast } from './supabaseClient.js?v=20260128_030';
  import { VIDEO_CATEGORIES, VIDEO_SOURCES, FREE_VIDEOS } from './assets/videos.js?v=20260326_001';

  // ── State ──
  let DB_VIDEOS = [];
  let ALL_VIDEOS = [...FREE_VIDEOS];
  let _accessSet = new Set();
  let _specialtyBundles = {};
  let _currentUser = null;

  // Filters
  let _filterAccess = 'all';   // all | free | member | training
  let _filterSource = 'all';   // all | glomcon | kidneysphere | external
  let _searchQuery = '';

  // Specialty expansion state: track which specialties are expanded
  const _expanded = new Set();
  const PREVIEW_COUNT = 4; // show this many per group by default

  // ── URL params ──
  const qs = new URLSearchParams(location.search);
  const _specialtyFilter = qs.get('specialty') || null;
  let _specialtyName = null;

  // Pre-set filters from URL
  if(qs.get('source')) _filterSource = qs.get('source');
  if(qs.get('access')) _filterAccess = qs.get('access');

  // ── DOM refs ──
  const sections = document.getElementById('videoSections');
  const loginHint = document.getElementById('loginHint');
  const searchBox = document.getElementById('searchBox');
  const accessPills = document.getElementById('accessPills');
  const sourcePills = document.getElementById('sourcePills');
  const payModal = document.getElementById('payModal');
  const payModalContent = document.getElementById('payModalContent');

  // ── Helpers ──
  function esc(s){
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function pill(label, active, onClick){
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'pill-btn' + (active ? ' active' : '');
    btn.textContent = label;
    btn.addEventListener('click', onClick);
    return btn;
  }

  // Determine the access level of a video: 'free' | 'member' | 'training'
  function videoAccessLevel(v){
    if(!v.is_paid) return 'free';
    if(v.membership_accessible) return 'member';
    return 'training';
  }

  // Check if user has access to a paid video
  function hasVideoAccess(v){
    if(!v.is_paid) return true;
    return _accessSet.has(v.id)
      || (v.specialty_id && _accessSet.has('sp_' + v.specialty_id))
      || (v.membership_accessible && _accessSet.has('membership'));
  }

  // Build watch.html URL — SECURITY: never pass source URLs in query params
  function watchUrl(v){
    const u = new URL('watch.html', location.href);
    u.searchParams.set('id', v.id);
    let bvid = v.bvid || '';
    if(!bvid){
      const src = v.source_url || v.mp4_url || '';
      const m = src.match(/\/video\/(BV[0-9A-Za-z]+)/i);
      if(m) bvid = m[1];
    }
    if(bvid) u.searchParams.set('bvid', bvid);
    return u.toString();
  }

  // ── Modal ──
  function showPayModal(v){
    const level = videoAccessLevel(v);
    let html = '';

    if(!_currentUser){
      html = `
        <h3>需要登录</h3>
        <p class="small muted">登录后可购买并观看此视频。</p>
        <div class="modal-actions">
          <a class="btn primary" href="login.html?next=${encodeURIComponent('videos.html')}">登录 / 注册</a>
        </div>`;
    } else if(level === 'member'){
      html = `
        <h3>GlomCon 会员内容</h3>
        <p class="small muted">此视频为 GlomCon 中国教育系列内容，开通年度会员即可解锁全部会员视频。</p>
        <div class="modal-actions">
          <a class="btn primary" href="checkout.html?product=MEMBERSHIP-YEARLY">开通会员 · ¥199/年</a>
          <a class="btn" href="academy.html#membership">了解会员详情</a>
        </div>`;
    } else if(level === 'training'){
      let btns = '';
      if(v.product_id){
        btns += `<a class="btn primary" href="checkout.html?product_id=${encodeURIComponent(v.product_id)}">购买单集</a>`;
      }
      const bundleId = v.specialty_id && _specialtyBundles[v.specialty_id];
      if(bundleId){
        btns += `<a class="btn" href="checkout.html?product_id=${encodeURIComponent(bundleId)}">购买整套课</a>`;
      }
      btns += `<a class="btn" href="academy.html#training-projects">查看培训项目</a>`;
      html = `
        <h3>培训课程内容</h3>
        <p class="small muted">此视频为专科培训课程内容，可通过以下方式解锁观看。</p>
        <div class="modal-actions">${btns}</div>`;
    }

    payModalContent.innerHTML = html;
    payModal.classList.add('active');
  }

  function hidePayModal(){
    payModal.classList.remove('active');
  }
  document.getElementById('payModalClose').addEventListener('click', hidePayModal);
  payModal.addEventListener('click', e => { if(e.target === payModal) hidePayModal(); });

  // ── Filters rendering ──
  function renderFilterPills(){
    const accessOpts = [
      { key: 'all', label: '全部' },
      { key: 'free', label: '免费' },
      { key: 'member', label: '会员' },
      { key: 'training', label: '培训课程' },
    ];
    accessPills.innerHTML = '';
    accessOpts.forEach(o => {
      accessPills.appendChild(pill(o.label, _filterAccess === o.key, () => {
        _filterAccess = o.key;
        renderFilterPills();
        renderAll();
      }));
    });

    const sourceOpts = [
      { key: 'all', label: '全部' },
      ...VIDEO_SOURCES.map(s => ({ key: s.key, label: s.zh })),
    ];
    sourcePills.innerHTML = '';
    sourceOpts.forEach(o => {
      sourcePills.appendChild(pill(o.label, _filterSource === o.key, () => {
        _filterSource = o.key;
        renderFilterPills();
        renderAll();
      }));
    });
  }

  // ── Search ──
  let _searchTimer = null;
  searchBox.addEventListener('input', () => {
    clearTimeout(_searchTimer);
    _searchTimer = setTimeout(() => {
      _searchQuery = searchBox.value.trim().toLowerCase();
      renderAll();
    }, 250);
  });

  // ── Video card ──
  function videoCard(v){
    const level = videoAccessLevel(v);
    const access = hasVideoAccess(v);
    const speaker = (v.speaker || '').trim();
    const catMeta = VIDEO_CATEGORIES.find(c => c.key === v.category);
    const catLabel = catMeta ? catMeta.zh : (v.category || '');

    // Badges
    let badgeHtml = '';
    if(level === 'free'){
      badgeHtml += `<span class="badge badge-free">免费</span>`;
    } else if(level === 'member'){
      badgeHtml += `<span class="badge badge-member">会员</span>`;
    } else {
      badgeHtml += `<span class="badge badge-training">培训课程</span>`;
    }
    if(access && v.is_paid){
      badgeHtml += `<span class="badge badge-purchased">已购</span>`;
    }
    // Source badge for GlomCon
    const srcMeta = VIDEO_SOURCES.find(s => s.key === (v.source || ''));
    if(srcMeta && v.source === 'glomcon'){
      badgeHtml += `<span class="badge badge-source">${esc(srcMeta.zh)}</span>`;
    }

    // Meta line
    const metaParts = [];
    if(speaker) metaParts.push(`主讲：${esc(speaker)}`);
    if(catLabel) metaParts.push(esc(catLabel));
    const metaLine = metaParts.join(' · ');

    // Action: click to watch or show payment modal
    const vid = esc(v.id);
    let actionHtml = '';
    if(access){
      actionHtml = `<a class="btn primary" href="${esc(watchUrl(v))}">观看</a>`;
    } else {
      actionHtml = `<button class="btn primary" data-pay-video="${vid}">观看</button>`;
    }

    return `
      <div class="vcard">
        <div class="vcard-top">
          <div style="min-width:0">
            <h4>${esc(v.title || '')}</h4>
            <div class="vcard-meta">${metaLine}</div>
          </div>
          <div class="vcard-badges">${badgeHtml}</div>
        </div>
        <div class="vcard-actions">${actionHtml}</div>
      </div>`;
  }

  // ── Grouped rendering by specialty ──
  function getFilteredVideos(){
    let list = [...ALL_VIDEOS];

    // Specialty filter (from URL param, e.g. my-learning)
    if(_specialtyFilter){
      list = list.filter(v => v.specialty_id === _specialtyFilter);
    }

    // Access level filter
    if(_filterAccess !== 'all'){
      list = list.filter(v => videoAccessLevel(v) === _filterAccess);
    }

    // Source filter
    if(_filterSource !== 'all'){
      list = list.filter(v => (v.source || 'external') === _filterSource);
    }

    // Search
    if(_searchQuery){
      list = list.filter(v =>
        (v.title || '').toLowerCase().includes(_searchQuery) ||
        (v.speaker || '').toLowerCase().includes(_searchQuery)
      );
    }

    return list;
  }

  function renderAll(){
    const list = getFilteredVideos();

    if(list.length === 0){
      sections.innerHTML = `<div class="note">没有符合条件的视频。</div>`;
      return;
    }

    // If specialty filter is active or search is active, show flat list
    if(_specialtyFilter || _searchQuery){
      sections.innerHTML = `<div class="video-grid-row">${list.map(videoCard).join('')}</div>`;
      bindPayButtons();
      return;
    }

    // Group by category
    const groups = new Map();
    for(const v of list){
      const cat = v.category || 'other';
      if(!groups.has(cat)) groups.set(cat, []);
      groups.get(cat).push(v);
    }

    // Sort groups by VIDEO_CATEGORIES order
    const catOrder = VIDEO_CATEGORIES.map(c => c.key);
    const sortedGroups = [...groups.entries()].sort((a, b) => {
      const ai = catOrder.indexOf(a[0]);
      const bi = catOrder.indexOf(b[0]);
      return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
    });

    // Sort videos within each group: free first, then by title
    const levelOrder = { free: 0, member: 1, training: 2 };
    for(const [, videos] of sortedGroups){
      videos.sort((a, b) => (levelOrder[videoAccessLevel(a)] ?? 2) - (levelOrder[videoAccessLevel(b)] ?? 2));
    }

    let html = '';
    for(const [catKey, videos] of sortedGroups){
      const catMeta = VIDEO_CATEGORIES.find(c => c.key === catKey);
      const catName = catMeta ? `${catMeta.zh}` : catKey;
      const isExpanded = _expanded.has(catKey);
      const showVideos = isExpanded ? videos : videos.slice(0, PREVIEW_COUNT);
      const hasMore = videos.length > PREVIEW_COUNT;

      html += `
        <div class="specialty-section">
          <div class="specialty-header">
            <h3>${esc(catName)}<span class="count">(${videos.length})</span></h3>
            ${hasMore ? `<button class="expand-btn" data-toggle-cat="${esc(catKey)}">${isExpanded ? '收起' : `查看全部 ${videos.length} 个 →`}</button>` : ''}
          </div>
          <div class="video-grid-row">
            ${showVideos.map(videoCard).join('')}
          </div>
        </div>`;
    }

    sections.innerHTML = html;
    bindPayButtons();
    bindToggleButtons();
  }

  // ── Event binding ──
  function bindPayButtons(){
    sections.querySelectorAll('[data-pay-video]').forEach(btn => {
      btn.addEventListener('click', () => {
        const vid = btn.getAttribute('data-pay-video');
        const v = ALL_VIDEOS.find(x => String(x.id) === vid);
        if(v) showPayModal(v);
      });
    });
  }

  function bindToggleButtons(){
    sections.querySelectorAll('[data-toggle-cat]').forEach(btn => {
      btn.addEventListener('click', () => {
        const cat = btn.getAttribute('data-toggle-cat');
        if(_expanded.has(cat)) _expanded.delete(cat);
        else _expanded.add(cat);
        renderAll();
      });
    });
  }

  // ── Login hint ──
  function renderLoginHint(){
    if(!isConfigured() || !supabase){
      loginHint.innerHTML = `<b>提示：</b>当前服务暂不可用（系统初始化中）。`;
      return;
    }
    if(_currentUser){
      loginHint.innerHTML = `已登录：<b>${esc(_currentUser.email || _currentUser.id)}</b>。<a href="my-learning.html">查看我的学习</a>`;
    } else {
      loginHint.innerHTML = `你当前未登录。浏览目录后点击"观看"将引导你登录或购买。`;
    }
  }

  // ── Upgrade module ──
  function renderUpgradeModule(){
    const mod = document.getElementById('upgradeModule');
    if(!mod) return;
    const hasPaid = ALL_VIDEOS.some(v => v.is_paid);
    if(!hasPaid){ mod.style.display = 'none'; return; }
    if(_accessSet.size > 0){ mod.style.display = 'none'; return; }
    mod.style.display = 'block';
  }

  // ── Data loading ──
  async function loadUserAccess(paidVideos){
    if(!_currentUser || !supabase || !paidVideos.length) return;
    try{
      const { data: ents } = await supabase
        .from('user_entitlements')
        .select('entitlement_type, video_id, specialty_id, end_at, status')
        .eq('user_id', _currentUser.id)
        .eq('status', 'active')
        .in('entitlement_type', ['single_video','specialty_bundle','membership'])
        .or(`end_at.is.null,end_at.gt.${new Date().toISOString()}`);

      for(const e of (ents || [])){
        if(e.entitlement_type === 'single_video' && e.video_id){
          _accessSet.add(String(e.video_id));
        } else if(e.entitlement_type === 'specialty_bundle' && e.specialty_id){
          _accessSet.add('sp_' + String(e.specialty_id));
        } else if(e.entitlement_type === 'membership'){
          _accessSet.add('membership');
        }
      }
    }catch(err){
      console.warn('loadUserAccess error:', err);
    }
  }

  async function loadSpecialtyBundles(){
    if(!supabase) return;
    try{
      const { data } = await supabase.from('specialties').select('id, bundle_product_id').eq('is_active', true);
      for(const s of (data || [])){
        if(s.bundle_product_id) _specialtyBundles[s.id] = s.bundle_product_id;
      }
    }catch(_e){}
  }

  async function loadDbVideos(){
    DB_VIDEOS = [];
    ALL_VIDEOS = [...FREE_VIDEOS];
    if(!isConfigured()) return;
    try{ await ensureSupabase(); }catch(_e){ return; }
    if(!supabase) return;
    try{
      let { data, error } = await supabase
        .from('learning_videos')
        .select('id,title,category,kind,source_url,mp4_url,bvid,aliyun_vid,speaker,created_at,enabled,deleted_at,is_paid,membership_accessible,specialty_id,product_id,source')
        .eq('enabled', true)
        .is('deleted_at', null)
        .order('created_at', { ascending: false })
        .limit(200);
      // Backward compat
      if(error && /is_paid|specialty_id|product_id|aliyun_vid|source/i.test(String(error.message || ''))){
        const r2 = await supabase
          .from('learning_videos')
          .select('id,title,category,kind,source_url,mp4_url,bvid,speaker,created_at,enabled,deleted_at')
          .eq('enabled', true).is('deleted_at', null)
          .order('created_at', { ascending: false }).limit(200);
        data = r2.data; error = r2.error;
      }
      if(error) throw error;

      DB_VIDEOS = (data || []).map(v => ({
        id: String(v.id),
        title: v.title || '',
        speaker: v.speaker || '',
        category: v.category || 'other',
        kind: v.kind || (v.bvid ? 'bilibili' : 'external'),
        bvid: v.bvid || null,
        aliyun_vid: v.aliyun_vid || null,
        source_url: v.source_url || v.mp4_url || '',
        mp4_url: v.mp4_url || null,
        source: v.source || 'external',
        is_paid: v.is_paid || false,
        membership_accessible: v.membership_accessible || false,
        specialty_id: v.specialty_id || null,
        product_id: v.product_id || null,
      }));

      ALL_VIDEOS = [...FREE_VIDEOS, ...DB_VIDEOS];
    }catch(e){
      const msg = String(e?.message || e || '');
      if(/relation .*learning_videos.* does not exist/i.test(msg)) return;
      toast('加载视频失败', msg, 'err');
    }
  }

  // ── Specialty filter header (from my-learning) ──
  function renderSpecialtyHeader(){
    if(!_specialtyFilter) return;
    const name = _specialtyName || '专科课程';
    const h2 = document.querySelector('.hero h2');
    if(h2) h2.textContent = `${name} · 视频库`;
    document.title = `${name} · 视频库 · 肾域`;
    const badge = document.querySelector('.hero .badge');
    if(badge) badge.textContent = `${name} · 视频库`;
    if(!document.getElementById('specialtyBackLink')){
      const link = document.createElement('div');
      link.id = 'specialtyBackLink';
      link.style.cssText = 'margin-top:8px;';
      link.innerHTML = `<a class="btn tiny" href="videos.html">\u2190 查看全部视频</a>  <a class="btn tiny" href="my-learning.html">返回我的学习</a>`;
      const h2El = document.querySelector('.hero h2');
      if(h2El) h2El.parentNode.insertBefore(link, h2El.nextSibling);
    }
  }

  // ── Init: immediately render static free videos ──
  try{ renderFilterPills(); }catch(e){ console.error('[videos] renderFilterPills error:', e); }
  try{ renderAll(); }catch(e){ console.error('[videos] renderAll error:', e); }

  async function init(){
    try{
      const timeout = new Promise(resolve => setTimeout(() => resolve([null, undefined]), 12000));
      const work = Promise.all([
        getCurrentUser().catch(() => null),
        loadDbVideos().catch(e => { console.warn('loadDbVideos failed:', e); }),
      ]);
      const results = await Promise.race([work, timeout]);
      _currentUser = results?.[0] ?? null;

      const paidVideos = ALL_VIDEOS.filter(v => v.is_paid);
      if(paidVideos.length > 0 && _currentUser){
        await Promise.all([loadUserAccess(paidVideos), loadSpecialtyBundles()]).catch(() => {});
      } else if(paidVideos.length > 0){
        await loadSpecialtyBundles().catch(() => {});
      }
    }catch(err){
      console.warn('videos init error (non-fatal):', err);
    }
    if(_specialtyFilter && supabase){
      try{
        const { data: sp } = await supabase.from('specialties').select('name').eq('id', _specialtyFilter).single();
        if(sp?.name) _specialtyName = sp.name;
      }catch(_e){}
      renderSpecialtyHeader();
    }
    try{ renderAll(); }catch(e){ console.error('[videos] renderAll error:', e); }
    try{ renderLoginHint(); }catch(e){ console.error('[videos] renderLoginHint error:', e); }
    try{ renderUpgradeModule(); }catch(e){ console.error('[videos] renderUpgradeModule error:', e); }
  }

  init();
</script>
