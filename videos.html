<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>学习中心 · 免费视频库 · 肾域</title>
  <meta name="description" content="肾域 — 面向肾脏专科的学术社区、临床科研与医生工具平台">
  <link rel="icon" href="assets/logo.png" />
  <link rel="stylesheet" href="styles.css?v=20260213_001" />
</head>
<body>
  <header class="nav"></header>

  <main>

<section class="hero">
  <div class="container">
    <div class="card">
      <span class=”badge”>视频库</span>
      <h2 style=”margin-top:10px”>视频库</h2>
      <p class=”small”>
        注册后免费观看公开视频；付费专科课程视频购买后永久解锁。
      </p>

      <div id=”loginHint” class=”note” style=”margin-top:12px”>
        以下免费视频注册后即可观看。正在检测登录状态…
      </div>

      <!-- 升级引导模块（免费注册用户可见，有权益后自动隐藏） -->
      <div id=”upgradeModule” style=”margin-top:14px;padding:14px 16px;background:rgba(63,131,248,.08);border:1px solid rgba(63,131,248,.25);border-radius:12px;display:none”>
        <div style=”display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px”>
          <div>
            <div style=”font-weight:600;font-size:14px”>想解锁专科课程视频？</div>
            <div class=”small muted” style=”margin-top:3px”>报名培训项目后可获得班期视频回放；整套课可永久解锁该专科所有视频。</div>
          </div>
          <div style=”display:flex;gap:8px;flex-wrap:wrap”>
            <a class=”btn primary” href=”academy.html#training-projects”>查看培训项目</a>
            <a class=”btn” href=”academy.html#pricing”>查看价格</a>
          </div>
        </div>
      </div>

      <div class=”hr”></div>

      <div class=”section-title”>
        <div>
          <h3>频道筛选</h3>
          <p>点击频道筛选；付费视频标注 🔒，登录后可购买。</p>
        </div>
        <div style=”display:flex;gap:10px;flex-wrap:wrap”>
          <a class=”btn” href=”academy.html”>培训与定价</a>
          <a class=”btn” href=”my-learning.html”>我的学习</a>
        </div>
      </div>

      <div id="catPills" class="pills" style="margin-top:10px"></div>

      <div class="hr"></div>

      <div id="videoGrid" class="grid cols-3"></div>

      <div class="hr"></div>

      <div class="note small">
          <b>版权与合规：</b>本站仅做“链接整理与学习索引”，不存储/搬运视频内容。
          <span data-admin-only hidden><br/>管理员提示：如需更新静态清单，可编辑 <code>assets/videos.js</code>；也可在本页的“管理员：新增视频”中添加到数据库。</span>
        </div>
    </div>
  </div>
</section>

<script type=”module”>
  import { supabase, ensureSupabase, isConfigured, getCurrentUser, toast } from './supabaseClient.js?v=20260128_030';
  import { VIDEO_CATEGORIES, FREE_VIDEOS } from './assets/videos.js?v=20260118_001';

  // mix static FREE_VIDEOS with DB learning_videos
  let DB_VIDEOS = [];
  let ALL_VIDEOS = [...FREE_VIDEOS];
  // Set of video IDs the current user has access to (paid videos)
  let _accessSet = new Set();
  // Map: specialty_id → bundle product_id (for buy buttons)
  let _specialtyBundles = {};
  let _currentUser = null;

  const qs = new URLSearchParams(location.search);
  let currentCat = (qs.get('cat') || 'all').toString();

  const catPills = document.getElementById('catPills');
  const grid = document.getElementById('videoGrid');
  const loginHint = document.getElementById('loginHint');

  function esc(s){
    return String(s).replace(/[&<>”']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','”':'&quot;',”'”:'&#39;'}[c]));
  }

  function pill(label, active, onClick){
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'pill-btn' + (active ? ' active' : '');
    btn.textContent = label;
    btn.addEventListener('click', onClick);
    return btn;
  }

  function setCat(cat){
    currentCat = cat;
    const url = new URL(location.href);
    if(cat === 'all') url.searchParams.delete('cat');
    else url.searchParams.set('cat', cat);
    history.replaceState({}, '', url.toString());
    renderCats();
    renderVideos();
  }

  function renderCats(){
    const all = [{ key: 'all', zh: '全部', en: 'All' }, ...VIDEO_CATEGORIES];
    catPills.innerHTML = '';
    all.forEach(c => {
      const label = c.key === 'all' ? '全部 / All' : `${c.zh} / ${c.en}`;
      catPills.appendChild(pill(label, currentCat === c.key, ()=> setCat(c.key)));
    });
  }

  function checkAliyunUrlExpiry(url){
    if(!url) return { expired: false };
    try{
      const u = new URL(url);
      const exp = u.searchParams.get('Expires');
      if(!exp) return { expired: false };
      const expiresAt = new Date(Number(exp) * 1000);
      if(isNaN(expiresAt.getTime())) return { expired: false };
      return { expired: expiresAt.getTime() < Date.now(), expiresAt };
    }catch{ return { expired: false }; }
  }

  function videoCard(v){
    let kind = v.kind || (v.bvid ? 'bilibili' : 'external');
    if(kind !== 'aliyun' && /aliyuncs\.com|alicdn\.com|aliyun\.com/i.test(v.source_url || v.mp4_url || '')){
      kind = 'aliyun';
    }
    const urlToCheck = v.mp4_url || v.source_url || '';
    const expiry = checkAliyunUrlExpiry(urlToCheck);
    const expiredBadge = expiry.expired
      ? `<span class=”badge” style=”border-color:rgba(255,100,100,.6);background:rgba(255,100,100,.1);color:#f66”>链接已过期</span>`
      : '';
    const needsCheckBadge = v.needs_check
      ? `<span class=”badge” style=”border-color:rgba(255,160,160,.5);background:rgba(255,160,160,.08)”>待核对</span>` : '';
    const speaker = (v.speaker || '').trim();
    const metaLine = speaker ? `主讲：${esc(speaker)}` : `分类：${esc(v.category || '')}`;
    const openUrl = v.mp4_url || v.source_url || '';
    const canOpen = !!openUrl;
    const openText = kind === 'aliyun' ? '阿里云播放' : (kind === 'mp4' ? '打开视频' : (kind === 'external' ? '打开链接' : '打开B站'));

    // ── Paid video logic ──
    if(v.is_paid){
      const hasAccess = _accessSet.has(v.id) || (v.specialty_id && _accessSet.has('sp_' + v.specialty_id));
      const lockBadge = `<span class=”badge” style=”border-color:rgba(234,179,8,.5);background:rgba(234,179,8,.1);color:#fbbf24”>付费</span>`;

      let actionBtns = '';
      if(hasAccess){
        // User has access
        actionBtns = `<a class=”btn primary” href=”watch.html?id=${encodeURIComponent(v.id)}”>立即观看</a>`;
        if(canOpen) actionBtns += `<a class=”btn” href=”${esc(openUrl)}” target=”_blank” rel=”noopener”>${openText}</a>`;
      } else {
        // Not purchased
        if(!_currentUser){
          actionBtns = `<a class=”btn” href=”login.html?next=${encodeURIComponent('videos.html')}”>登录后购买</a>`;
        } else {
          if(v.product_id){
            actionBtns += `<a class=”btn primary” href=”checkout.html?product_id=${encodeURIComponent(v.product_id)}”>购买单集</a>`;
          }
          const bundleId = v.specialty_id && _specialtyBundles[v.specialty_id];
          if(bundleId){
            actionBtns += `<a class=”btn” href=”checkout.html?product_id=${encodeURIComponent(bundleId)}”>购买整套课</a>`;
          }
          if(!v.product_id && !bundleId){
            actionBtns = `<a class=”btn” href=”learning.html”>查看课程详情</a>`;
          }
        }
      }

      return `
        <div class=”card soft” style=”${hasAccess ? '' : 'opacity:.85'}”>
          <div style=”display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-wrap:wrap”>
            <div>
              <h3 style=”margin:0”>${esc(v.title || '')}</h3>
              <div class=”small muted” style=”margin-top:6px”>${metaLine}</div>
            </div>
            <div style=”display:flex;gap:4px;flex-wrap:wrap”>
              ${lockBadge}
              ${hasAccess ? `<span class=”badge” style=”border-color:rgba(34,197,94,.5);background:rgba(34,197,94,.1);color:#4ade80”>已购</span>` : ''}
              ${expiredBadge}${needsCheckBadge}
            </div>
          </div>
          <div style=”display:flex;gap:10px;flex-wrap:wrap;margin-top:12px”>
            ${actionBtns}
          </div>
        </div>`;
    }

    // ── Free video ──
    return `
      <div class=”card soft”>
        <div style=”display:flex;align-items:flex-end;justify-content:space-between;gap:10px;flex-wrap:wrap”>
          <div>
            <h3 style=”margin:0”>${esc(v.title || '')}</h3>
            <div class=”small muted” style=”margin-top:6px”>${metaLine}</div>
          </div>
          ${needsCheckBadge}
          ${expiredBadge}
        </div>
        <div style=”display:flex;gap:10px;flex-wrap:wrap;margin-top:12px”>
          <a class=”btn primary” href=”watch.html?id=${encodeURIComponent(v.id)}”>观看（需登录）</a>
          ${canOpen ? `<a class=”btn” href=”${esc(openUrl)}” target=”_blank” rel=”noopener”>${openText}</a>` : ''}
        </div>
      </div>`;
  }

  function renderVideos(){
    const list = (currentCat === 'all')
      ? ALL_VIDEOS
      : ALL_VIDEOS.filter(v => v.category === currentCat);

    if(!list || list.length === 0){
      grid.innerHTML = `<div class=”note”>该频道暂无视频内容。</div>`;
      return;
    }

    grid.innerHTML = list.map(videoCard).join('');
  }

  async function renderLoginHint(){
    if(!isConfigured() || !supabase){
      loginHint.innerHTML = `<b>提示：</b>当前服务暂不可用（系统初始化中）。`;
      return;
    }
    if(_currentUser){
      loginHint.innerHTML = `✅ 已登录：<b>${esc(_currentUser.email || _currentUser.id)}</b>。<a href=”my-learning.html”>查看我的学习</a>`;
    }else{
      loginHint.innerHTML = `🔒 你当前未登录。浏览目录后点击”购买”或”观看”将引导你登录/注册。`;
    }
  }

  /* Batch-load user entitlements for paid video access check */
  async function loadUserAccess(paidVideos){
    if(!_currentUser || !supabase || !paidVideos.length) return;
    try{
      // Fetch all active entitlements for this user (single_video + specialty_bundle)
      const { data: ents } = await supabase
        .from('user_entitlements')
        .select('entitlement_type, video_id, specialty_id, end_at, status')
        .eq('user_id', _currentUser.id)
        .eq('status', 'active')
        .in('entitlement_type', ['single_video','specialty_bundle','membership'])
        .or(`end_at.is.null,end_at.gt.${new Date().toISOString()}`);

      for(const e of (ents || [])){
        if(e.entitlement_type === 'single_video' && e.video_id){
          _accessSet.add(String(e.video_id));
        } else if(e.entitlement_type === 'specialty_bundle' && e.specialty_id){
          _accessSet.add('sp_' + String(e.specialty_id));
        }
      }
    }catch(err){
      console.warn('loadUserAccess error:', err);
    }
  }

  /* Load specialty → bundle product mapping for buy buttons */
  async function loadSpecialtyBundles(){
    if(!supabase) return;
    try{
      const { data } = await supabase.from('specialties').select('id, bundle_product_id').eq('is_active', true);
      for(const s of (data || [])){
        if(s.bundle_product_id) _specialtyBundles[s.id] = s.bundle_product_id;
      }
    }catch(_e){}
  }

  async function loadDbVideos(){
    DB_VIDEOS = [];
    ALL_VIDEOS = [...FREE_VIDEOS];
    if(!isConfigured()) return;
    try{ await ensureSupabase(); }catch(_e){ return; }
    if(!supabase) return;
    try{
      let { data, error } = await supabase
        .from('learning_videos')
        .select('id,title,category,kind,source_url,mp4_url,bvid,aliyun_vid,speaker,created_at,enabled,deleted_at,is_paid,specialty_id,product_id')
        .eq('enabled', true)
        .is('deleted_at', null)
        .order('created_at', { ascending: false })
        .limit(200);
      // Backward compat
      if(error && /is_paid|specialty_id|product_id|aliyun_vid/i.test(String(error.message || ''))){
        const r2 = await supabase
          .from('learning_videos')
          .select('id,title,category,kind,source_url,mp4_url,bvid,speaker,created_at,enabled,deleted_at')
          .eq('enabled', true).is('deleted_at', null)
          .order('created_at', { ascending: false }).limit(200);
        data = r2.data; error = r2.error;
      }
      if(error) throw error;

      DB_VIDEOS = (data || []).map(v => ({
        id: String(v.id),
        title: v.title || '',
        speaker: v.speaker || '',
        category: v.category || 'other',
        kind: v.kind || (v.bvid ? 'bilibili' : 'external'),
        bvid: v.bvid || null,
        aliyun_vid: v.aliyun_vid || null,
        source_url: v.source_url || v.mp4_url || '',
        mp4_url: v.mp4_url || null,
        is_paid: v.is_paid || false,
        specialty_id: v.specialty_id || null,
        product_id: v.product_id || null,
      }));

      ALL_VIDEOS = [...FREE_VIDEOS, ...DB_VIDEOS];
    }catch(e){
      const msg = String(e?.message || e || '');
      if(/relation .*learning_videos.* does not exist/i.test(msg)) return;
      toast('加载视频失败', msg, 'err');
    }
  }

  // ── Immediately render free videos + categories (sync, no DB needed) ──
  try{ renderCats(); }catch(e){ console.error('[videos] renderCats error:', e); }
  try{ renderVideos(); }catch(e){ console.error('[videos] renderVideos error:', e); }

  async function init(){
    try{
      // Check login + load DB videos in parallel, with 12s timeout to prevent hang
      const timeout = new Promise(resolve => setTimeout(() => resolve([null, undefined]), 12000));
      const work = Promise.all([
        getCurrentUser().catch(() => null),
        loadDbVideos().catch(e => { console.warn('loadDbVideos failed:', e); }),
      ]);
      const results = await Promise.race([work, timeout]);
      _currentUser = results?.[0] ?? null;

      const paidVideos = DB_VIDEOS.filter(v => v.is_paid);
      if(paidVideos.length > 0 && _currentUser){
        await Promise.all([loadUserAccess(paidVideos), loadSpecialtyBundles()]).catch(() => {});
      } else if(paidVideos.length > 0){
        await loadSpecialtyBundles().catch(() => {});
      }
    }catch(err){
      console.warn('videos init error (non-fatal):', err);
    }
    // Re-render with DB videos + access info
    try{ renderVideos(); }catch(e){ console.error('[videos] renderVideos error:', e); }
    try{ renderLoginHint(); }catch(e){ console.error('[videos] renderLoginHint error:', e); }
    try{ renderUpgradeModule(); }catch(e){ console.error('[videos] renderUpgradeModule error:', e); }
  }

  function renderUpgradeModule(){
    const mod = document.getElementById('upgradeModule');
    if(!mod) return;
    const hasPaid = DB_VIDEOS.some(v => v.is_paid);
    if(!hasPaid){ mod.style.display = 'none'; return; }
    if(_accessSet.size > 0){ mod.style.display = 'none'; return; }
    mod.style.display = 'block';
  }

  init();
</script>

  </main>

  <footer class="footer" data-blurb="当前版本 · 以“病例讨论 + 学习中心 + 前沿进展”为核心，持续迭代完善。"></footer>
<script type="module" src="app.js?v=20260128_030"></script>
</body>
</html>
