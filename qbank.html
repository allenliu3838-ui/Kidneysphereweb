<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>题库 · 肾域</title>
  <meta name="description" content="肾域题库 — 大内科 · 肾内科 · 考研">
  <link rel="canonical" href="https://kidneysphere.com/qbank" />
  <link rel="icon" href="assets/logo.png" />
  <link rel="stylesheet" href="styles.css?v=20260410_qbank2" />
</head>
<body>
  <header class="nav"></header>
  <div data-toast></div>

  <main>
    <section class="hero">
      <div class="container">

        <!-- Bank selector (top level) -->
        <div class="card">
          <span class="badge">Q-Bank</span>
          <h2 style="margin-top:10px">肾域题库</h2>
          <p class="small muted">选择题库开始练习 — UWorld 风格答题体验</p>

          <div class="grid cols-3" style="margin-top:20px" id="bankCards">
            <div class="card soft qb-bank-card" data-bank="大内科" role="button" tabindex="0">
              <div style="font-size:28px;margin-bottom:8px">🏥</div>
              <h3 style="margin:0">大内科</h3>
              <p class="small muted" style="margin-top:6px">心血管、呼吸、消化、内分泌、血液、风湿、感染等</p>
              <div class="small muted qb-bank-stat" data-bank-stat="大内科">--</div>
            </div>
            <div class="card soft qb-bank-card" data-bank="肾内科" role="button" tabindex="0">
              <div style="font-size:28px;margin-bottom:8px">🫘</div>
              <h3 style="margin:0">肾内科</h3>
              <p class="small muted" style="margin-top:6px">肾小球疾病、CKD、AKI、电解质、透析、移植等</p>
              <div class="small muted qb-bank-stat" data-bank-stat="肾内科">--</div>
            </div>
            <div class="card soft qb-bank-card" data-bank="考研" role="button" tabindex="0">
              <div style="font-size:28px;margin-bottom:8px">📝</div>
              <h3 style="margin:0">考研西综</h3>
              <p class="small muted" style="margin-top:6px">西医综合真题与模拟：生理、生化、病理、内科、外科</p>
              <div class="small muted qb-bank-stat" data-bank-stat="考研">--</div>
            </div>
          </div>
        </div>

        <!-- Practice panel (shown after selecting a bank) -->
        <div class="card" id="practicePanel" hidden style="margin-top:16px">
          <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
            <div>
              <span class="badge" id="currentBankBadge"></span>
              <span style="font-weight:700;font-size:18px;margin-left:8px" id="currentBankTitle"></span>
            </div>
            <button class="btn tiny" id="btnChangeBank">← 切换题库</button>
          </div>

          <!-- My progress -->
          <div id="myProgress" style="margin-top:16px">
            <div class="muted small">加载中…</div>
          </div>

          <div class="hr"></div>

          <!-- Start practice -->
          <div class="section-title">
            <h3>开始练习</h3>
          </div>

          <!-- Subject filter -->
          <div style="margin-top:12px">
            <label class="small muted">科目（点击选择，不选 = 全部）</label>
            <div id="subjectPills" style="margin-top:8px;display:flex;flex-wrap:wrap;gap:6px">
              <div class="muted small">加载中…</div>
            </div>
          </div>

          <!-- Filter mode -->
          <div style="margin-top:16px">
            <label class="small muted">题目范围</label>
            <div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:10px">
              <label class="qb-radio"><input type="radio" name="qfilter" value="all" checked> 全部</label>
              <label class="qb-radio"><input type="radio" name="qfilter" value="unused"> 未做过的</label>
              <label class="qb-radio"><input type="radio" name="qfilter" value="incorrect"> 做错的</label>
              <label class="qb-radio"><input type="radio" name="qfilter" value="bookmarked"> 收藏的</label>
            </div>
          </div>

          <!-- Question count -->
          <div style="margin-top:16px">
            <label class="small muted">题目数量</label>
            <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap">
              <button class="btn tiny qb-count-btn" data-count="10">10</button>
              <button class="btn tiny qb-count-btn qb-count-active" data-count="20">20</button>
              <button class="btn tiny qb-count-btn" data-count="30">30</button>
              <button class="btn tiny qb-count-btn" data-count="40">40</button>
              <button class="btn tiny qb-count-btn" data-count="50">50</button>
              <button class="btn tiny qb-count-btn" data-count="60">60</button>
            </div>
          </div>

          <!-- Start button -->
          <div style="margin-top:24px">
            <button class="btn primary" id="btnStart" style="font-size:16px;padding:12px 36px">开始答题</button>
          </div>

          <div class="hr"></div>

          <!-- Per-subject stats -->
          <div class="section-title">
            <h3>各科目统计</h3>
          </div>
          <div id="subjectStats" style="margin-top:12px">
            <div class="muted small">加载中…</div>
          </div>
        </div>

        <!-- Admin link -->
        <div id="adminLink" hidden style="margin-top:16px">
          <a href="qbank-admin.html" class="btn tiny">管理员：题目管理 →</a>
        </div>

      </div>
    </section>
  </main>

  <footer class="footer" data-blurb="面向肾脏专科的学术教育与持续培训平台。"></footer>
  <script type="module" src="app.js?v=20260410_qbank2"></script>
  <script type="module" src="qbank.js?v=20260410_qbank2"></script>
</body>
</html>
