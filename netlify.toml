[build]
  publish = "."
  edge_functions = "netlify/edge-functions"

[functions]
  directory = "netlify/functions"

# Article SSR: inject article content into HTML response
[[edge_functions]]
  path = "/article"
  function = "article-ssr"

[[edge_functions]]
  path = "/article.html"
  function = "article-ssr"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-XSS-Protection = "1; mode=block"
    Cross-Origin-Opener-Policy = "same-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://cdn.jsdelivr.net https://esm.sh https://cdn.skypack.dev https://registry.npmmirror.com https://g.alicdn.com; style-src 'self' 'unsafe-inline' https://g.alicdn.com; img-src 'self' data: https:; font-src 'self' data: https://g.alicdn.com; connect-src 'self' https://eaatpwakhcjxjonlyfii.supabase.co https://vod.kidneysphere.com https://*.aliyuncs.com; frame-src https://player.bilibili.com https://view.officeapps.live.com; media-src 'self' https: blob:; object-src 'none'; base-uri 'self'; form-action 'self'"

# Avoid caching the runtime config during rapid iterations
[[headers]]
  for = "/assets/config.js"
  [headers.values]
    Cache-Control = "no-store, max-age=0"


# Performance: cache static assets for 7 days (safe for Phase 1; refresh if you redeploy)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/*.css"
  [headers.values]
    # During rapid UI iterations (header/layout), avoid stale CSS.
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    # Avoid stale JS during Phase 1 iterations.
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"


[[redirects]]
  from = "/api/content"
  to = "/.netlify/functions/api-content"
  status = 200

[[redirects]]
  from = "/api/content/*"
  to = "/.netlify/functions/api-content/:splat"
  status = 200

[[redirects]]
  from = "/api/me"
  to = "/.netlify/functions/api-me"
  status = 200

# Video access check: GET /api/videos/:id/access
[[redirects]]
  from = "/api/videos/*/access"
  to = "/.netlify/functions/video-access"
  status = 200

# Video play authorization: POST /api/videos/*/play-auth
[[redirects]]
  from = "/api/videos/*/play-auth"
  to = "/.netlify/functions/video-play-auth"
  status = 200

# Dev/admin manual entitlement grant
[[redirects]]
  from = "/api/dev/grant-access"
  to = "/.netlify/functions/dev-grant-access"
  status = 200

# Domain canonicalization: www → non-www (301)
[[redirects]]
  from = "https://www.kidneysphere.com/*"
  to = "https://kidneysphere.com/:splat"
  status = 301
  force = true
