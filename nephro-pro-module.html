<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>肾域 Pro · 模块</title>
  <meta name="description" content="肾域 Pro 模块详情页" />
  <link rel="stylesheet" href="styles.css" />
  <script type="module" src="app.js"></script>
  <script type="module" src="nephro-pro-module.js"></script>
</head>
<body>
  <header class="nav"></header>
  <main class="container" style="padding:16px;max-width:1100px;margin:0 auto;">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px;">
      <a class="btn tiny" href="nephro-pro.html" aria-label="返回肾域 Pro">← 肾域 Pro</a>
      <a class="btn tiny" href="academy.html#membership" aria-label="教育会员权益">查看会员权益</a>
    </div>

    <!-- Module header (filled by JS) -->
    <section class="card" id="moduleHeader" style="padding:20px;background:linear-gradient(135deg,rgba(168,85,247,.08),rgba(74,144,226,.06));border:1px solid rgba(168,85,247,.25);"></section>

    <!-- Paywall gate -->
    <section id="moduleGate" style="margin-top:14px;"></section>

    <!-- Items grid -->
    <section style="margin-top:16px;">
      <h2 id="moduleItemsTitle" style="margin-bottom:10px;">内容</h2>
      <div id="moduleItems" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;"></div>
    </section>

    <!-- Compliance -->
    <section class="card" style="margin-top:18px;padding:16px;">
      <h3 style="margin-top:0;">合规与版权说明</h3>
      <ul style="margin:0;padding-left:18px;line-height:1.8;font-size:14px;">
        <li>本平台内容仅用于医学教育、文献学习与临床参考，不替代医生诊疗决策。</li>
        <li>AI 生成或辅助整理的内容会明确标记，并进入医学审核流程。</li>
        <li>文献图片遵循版权规范：优先使用原创重绘、开放许可图片或原文外链，不直接复制期刊原图，除非已获得明确授权。</li>
      </ul>
    </section>
  </main>
  <footer class="footer"></footer>
</body>
</html>
