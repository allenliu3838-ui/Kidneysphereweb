<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>播放 · 肾域</title>
  <meta name="description" content="肾域 — 面向肾脏专科的学术社区、临床科研与医生工具平台">
  <link rel="icon" href="assets/logo.png" />
  <link rel="stylesheet" href="styles.css?v=20260213_001" />
  <!-- Aliplayer SDK for Alibaba Cloud VOD (loaded async to avoid blocking) -->
  <link rel="stylesheet" href="https://g.alicdn.com/apsara-media-box/imp-web-player/2.35.4/skins/default/aliplayer-min.css" />
  <script async src="https://g.alicdn.com/apsara-media-box/imp-web-player/2.35.4/aliplayer-min.js"></script>
</head>
<body>
  <header class="nav"></header>

  <main>

<section class="hero">
  <div class="container">
    <div class="card">
      <span class="badge">学习中心 · 播放</span>
      <h2 id="title" style="margin-top:10px">正在加载…</h2>
      <p class="small muted" id="meta"></p>

      <div class="hr"></div>

      <div id="playerWrap" class="video-wrap">
        <!-- iframe injected here -->
      </div>

      <div class="note small" style="margin-top:12px">
        如果播放器无法显示/卡住：
        <ul class=”list” style=”margin:8px 0 0”>
          <li>请先确认已登录（本页为”注册后观看”）。</li>
          <li>尝试刷新页面；或使用无痕窗口；或清理站点缓存后重试。</li>
          <li>仍不行可点击下方按钮在原始平台（B站/阿里云等）直接观看。</li>
        </ul>
      </div>

      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:14px">
        <a class="btn" href="videos.html">返回视频目录</a>
        <a class="btn" id="openBili" href="javascript:void(0)" target="_blank" rel="noopener">打开B站</a>
      </div>

    </div>
  </div>
</section>

<script type="module">
  import { supabase, ensureSupabase, ensureAuthed, isConfigured, toast } from './supabaseClient.js?v=20260128_030';
  import { getVideoById, getCategoryMeta } from './assets/videos.js?v=20260118_001';

  // 1) Require login (matches “注册后观看”)
  await ensureAuthed('login.html');

  const qs = new URLSearchParams(location.search);
  const id = (qs.get('id') || '').toString();

  const titleEl = document.getElementById('title');
  const metaEl = document.getElementById('meta');
  const wrap = document.getElementById('playerWrap');
  const openBili = document.getElementById('openBili');

  function esc(s){
    return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  }

  if(!id){
    titleEl.textContent = '视频参数缺失';
    metaEl.textContent = '请从视频目录进入。';
    wrap.innerHTML = `<div class="note">缺少参数：<code>id</code></div>`;
  }else{
    // 1) Static list
    let v = getVideoById(id);

    // 2) DB list (admin added videos) - scheme 2
    if(!v && isConfigured()){
      try{
        await ensureSupabase();
        if(supabase){
          let { data, error } = await supabase
            .from('learning_videos')
            .select('id,title,category,kind,source_url,mp4_url,bvid,aliyun_vid,speaker,created_at,enabled,deleted_at')
            .eq('id', id)
            .maybeSingle();
          // Backward compat: retry without aliyun_vid if column doesn't exist yet
          if(error && /aliyun_vid/i.test(String(error.message || ''))){
            const r2 = await supabase
              .from('learning_videos')
              .select('id,title,category,kind,source_url,mp4_url,bvid,speaker,created_at,enabled,deleted_at')
              .eq('id', id)
              .maybeSingle();
            data = r2.data;
            error = r2.error;
          }
          if(!error && data && !data.deleted_at && data.enabled !== false){
            v = {
              id: String(data.id),
              title: data.title || '',
              category: data.category || 'other',
              kind: data.kind || (data.bvid ? 'bilibili' : (data.mp4_url ? 'mp4' : 'external')),
              bvid: data.bvid || null,
              aliyun_vid: data.aliyun_vid || null,
              speaker: data.speaker || '',
              source_url: data.source_url || data.mp4_url || '',
              mp4_url: data.mp4_url || null,
            };
          }
        }
      }catch(_e){
        // ignore
      }
    }

    if(!v){
      titleEl.textContent = '未找到该视频';
      metaEl.textContent = '可能链接已更新或目录尚未同步。';
      wrap.innerHTML = `<div class="note">找不到视频：<code>${esc(id)}</code></div>`;
    }else{
      // Auto-detect aliyun URLs regardless of stored kind
      function isAliyunUrl(url){
        if(!url) return false;
        return /aliyuncs\.com|alicdn\.com|aliyun\.com/i.test(url);
      }
      let kind = v.kind || (v.bvid ? 'bilibili' : (v.mp4_url ? 'mp4' : 'external'));
      if(kind !== 'aliyun' && (isAliyunUrl(v.source_url) || isAliyunUrl(v.mp4_url))){
        kind = 'aliyun';
      }
      const cat = getCategoryMeta(v.category);
      titleEl.textContent = v.title || '（无标题）';
      const sp = String(v.speaker || '').trim();
      metaEl.textContent = `频道：${cat ? (cat.zh + ' / ' + cat.en) : (v.category || '')}${sp ? (' · 主讲：' + sp) : ''}`;

      // Open button — only set href if it looks like a real URL
      const openUrl = v.mp4_url || v.source_url || '';
      const isValidUrl = /^https?:\/\//i.test(openUrl);
      if(isValidUrl){
        openBili.href = openUrl;
      }else{
        openBili.href = 'javascript:void(0)';
        openBili.title = '无可用链接';
      }
      openBili.textContent = (kind === 'aliyun') ? '打开视频源' : (kind === 'mp4') ? '打开视频文件' : (kind === 'external' ? '打开来源链接' : '打开B站');

      if(kind === 'aliyun'){
        // Alibaba Cloud VOD — use Aliplayer SDK with source URL
        const aliSource = v.mp4_url || v.source_url || openUrl;
        wrap.innerHTML = '<div id="aliyun-player" style="width:100%;max-width:980px;border-radius:16px;overflow:hidden;background:#000;border:1px solid rgba(255,255,255,.12)"></div>';

        function initAliplayer(){
          new Aliplayer({
            id: 'aliyun-player',
            source: aliSource,
            width: '100%',
            height: '560px',
            autoplay: false,
            isLive: false,
            controlBarVisibility: 'hover',
            skinLayout: [
              { name: 'bigPlayButton', align: 'cc' },
              { name: 'H5Loading', align: 'cc' },
              { name: 'controlBar', align: 'blabs', x: 0, y: 0, children: [
                { name: 'progress', align: 'blabs', x: 0, y: 44 },
                { name: 'playButton', align: 'tl', x: 15, y: 12 },
                { name: 'timeDisplay', align: 'tl', x: 10, y: 7 },
                { name: 'fullScreenButton', align: 'tr', x: 10, y: 12 },
                { name: 'volume', align: 'tr', x: 5, y: 10 },
              ]}
            ]
          });
        }

        function fallbackPlayer(){
          var el = document.getElementById('aliyun-player');
          if(el) el.innerHTML = '<video controls playsinline style="width:100%;height:560px;background:#000"><source src="' + esc(aliSource) + '" type="video/mp4" />你的浏览器不支持播放。</video>';
        }

        if(typeof Aliplayer !== 'undefined'){
          initAliplayer();
        }else{
          // SDK still loading (async) — wait up to 8s then fallback
          var waited = 0;
          var timer = setInterval(function(){
            waited += 200;
            if(typeof Aliplayer !== 'undefined'){
              clearInterval(timer);
              initAliplayer();
            }else if(waited >= 8000){
              clearInterval(timer);
              fallbackPlayer();
            }
          }, 200);
        }
      }else if(kind === 'mp4'){
        wrap.innerHTML = `
          <video controls playsinline style="width:100%;max-width:980px;border-radius:16px;background:#000;border:1px solid rgba(255,255,255,.12)">
            <source src="${esc(openUrl)}" type="video/mp4" />
            你的浏览器不支持 MP4 播放。
          </video>
        `;
      }else if(kind === 'external'){
        wrap.innerHTML = `
          <div class="note">
            该视频为外部链接，平台可能不允许直接嵌入播放。
            <div style="margin-top:12px">
              <a class="btn primary" href="${esc(openUrl)}" target="_blank" rel="noopener">打开来源观看</a>
            </div>
          </div>
        `;
      }else{
        // Official Bilibili embed
        let bvid = v.bvid || '';
        if(!bvid && openUrl){
          const m = String(openUrl).match(/\/video\/(BV[0-9A-Za-z]+)/i);
          if(m) bvid = m[1];
        }

        if(!bvid){
          wrap.innerHTML = `
            <div class="note">
              该视频缺少 BV 号，无法嵌入播放。
              <div style="margin-top:12px">
                <a class="btn primary" href="${esc(openUrl)}" target="_blank" rel="noopener">打开B站观看</a>
              </div>
            </div>
          `;
        }else{
          const src = `https://player.bilibili.com/player.html?bvid=${encodeURIComponent(bvid)}&page=1&high_quality=1&danmaku=0`;
          wrap.innerHTML = `
            <div class="video-embed">
              <iframe
                src="${src}"
                scrolling="no"
                border="0"
                frameborder="no"
                framespacing="0"
                allowfullscreen="true"
              ></iframe>
            </div>
          `;
        }
      }
    }
  }

  // Supabase demo mode hint
  if(!isConfigured()){
    toast('服务暂不可用', '当前服务尚未完成初始化或配置，请联系管理员。', 'err');
  }
</script>

  </main>

  <footer class="footer" data-blurb="当前版本 · 学习中心视频库（注册后观看）"></footer>
<script type="module" src="app.js?v=20260128_030"></script>
</body>
</html>
