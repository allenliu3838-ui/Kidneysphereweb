})();

<!-- Timeout fallback -->
<script>
(function(){
  if(window.__watchRendered) return;
  var timer = setTimeout(function(){
    if(window.__watchRendered) return;
    var titleEl = document.getElementById('title');
    var wrap = document.getElementById('playerWrap');
    if(titleEl && titleEl.textContent === '正在加载…'){
      titleEl.textContent = '加载超时';
      if(wrap) wrap.innerHTML = '<div class="note" style="border-color:rgba(255,160,80,.4);background:rgba(255,160,80,.06)">'
        + '<p>页面加载时间过长，可能是网络连接问题。</p>'
        + '<ul class="list" style="margin:8px 0 0">'
        + '<li>请刷新页面重试</li>'
        + '<li>检查网络连接是否正常</li>'
        + '<li>尝试使用无痕窗口或清理浏览器缓存</li>'
        + '<li>返回 <a href="videos.html">视频目录</a></li>'
        + '</ul></div>';
    }
  }, 15000);
  window.__watchCancelTimeout = function(){ clearTimeout(timer); };
})();
</script>

<script type="module">
  import { supabase, ensureSupabase, ensureAuthed, isConfigured, getCurrentUser, toast } from './supabaseClient.js?v=20260128_030';
  import { getVideoById, getCategoryMeta } from './assets/videos.js?v=20260118_001';

  const titleEl = document.getElementById('title');
  const metaEl = document.getElementById('meta');
  const descEl = document.getElementById('desc');
  const wrap = document.getElementById('playerWrap');
  const openBtn = document.getElementById('openExternal');
  const paidGate = document.getElementById('paidGate');
  const loginGate = document.getElementById('loginGate');
  const loginBtn = document.getElementById('loginBtn');
  const playerHint = document.getElementById('playerHint');

  function esc(s){
    return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  }

  function showFatalError(msg){
    titleEl.textContent = '加载失败';
    metaEl.textContent = '';
    wrap.innerHTML = `<div class="note" style="border-color:rgba(255,120,120,.4);background:rgba(255,120,120,.06)">
      <p>${esc(msg)}</p>
      <div style="margin-top:12px"><a class="btn" href="videos.html">返回视频目录</a></div>
    </div>`;
  }

  const qs = new URLSearchParams(location.search);
  const id = (qs.get('id') || '').toString();

  // Cancel the timeout fallback
  if(typeof window.__watchCancelTimeout === 'function') window.__watchCancelTimeout();

  // If the immediate renderer already handled this video (static Bilibili), skip.
  if(window.__watchRendered){
    console.log('[watch] Video already rendered by immediate script, skipping module.');
    ensureAuthed('login.html').catch(() => {});
  } else {

  try{

  if(!id){
    titleEl.textContent = '视频参数缺失';
    metaEl.textContent = '请从视频目录进入。';
    wrap.innerHTML = `<div class="note">缺少参数：<code>id</code></div>`;
  }else{

    // ── Get current user (don't force redirect yet) ──
    let currentUser = null;
    let token = null;
    try{
      console.log('[watch] step1: calling ensureSupabase...');
      await ensureSupabase();
      console.log('[watch] step2: supabase ready?', !!supabase);
      if(supabase){
        // Try getSession first
        console.log('[watch] step3: calling getSession...');
        const { data } = await supabase.auth.getSession();
        console.log('[watch] step4: getSession result:', data?.session ? 'HAS SESSION' : 'NO SESSION');
        if(data?.session?.user){
          currentUser = data.session.user;
          token = data.session.access_token;
          console.log('[watch] step5a: got user from getSession');
        }else{
          // Session may not be restored yet — wait for onAuthStateChange
          console.log('[watch] step5b: waiting for onAuthStateChange...');
          const result = await new Promise((resolve) => {
            const tmr = setTimeout(() => { console.log('[watch] step6: onAuthStateChange TIMEOUT'); resolve(null); }, 12000);
            const { data: { subscription } } = supabase.auth.onAuthStateChange((event, session) => {
              console.log('[watch] step6: onAuthStateChange event:', event, 'hasSession:', !!session);
              if(session?.user){
                clearTimeout(tmr);
                subscription.unsubscribe();
                resolve(session);
              }
            });
          });
          if(result){
            currentUser = result.user;
            token = result.access_token;
            console.log('[watch] step7: got user from onAuthStateChange');
          }else{
            console.log('[watch] step7: NO user after onAuthStateChange');
          }
        }
      }
    }catch(e){
      console.warn('[watch] auth check error:', e);
    }
    console.log('[watch] FINAL: currentUser=', !!currentUser, 'token=', !!token);
    const headers = { Accept: 'application/json' };
    if(token) headers.Authorization = `Bearer ${token}`;

    const accessRes = await fetch(`/api/videos/${encodeURIComponent(id)}/access`, { headers });
    const accessData = accessRes.ok ? await accessRes.json() : null;

    if(!accessData || accessData.error === 'video_not_found' || accessData.error === 'video_not_published'){
      // Fallback 1: try static video list
      const sv = getVideoById(id);
      if(sv){
        renderBilibiliPlayer(sv);
      }else{
        // Fallback 2: query DB directly via Supabase (for DB videos when API unavailable)
        let dbVideo = null;
        if(isConfigured()){
          try{
            await ensureSupabase();
            if(supabase){
              const { data } = await supabase
                .from('learning_videos')
                .select('id,title,category,kind,source_url,mp4_url,bvid,aliyun_vid,speaker,is_paid,membership_accessible,specialty_id,enabled,deleted_at')
                .eq('id', id)
                .maybeSingle();
              if(data && !data.deleted_at && data.enabled !== false){
                dbVideo = data;
              }
            }
          }catch(_e){ console.warn('[watch] DB fallback error:', _e); }
        }

        if(dbVideo){
          // For free bilibili/external videos, render directly
          const bvid = dbVideo.bvid || '';
          if(bvid || (dbVideo.kind === 'bilibili')){
            renderBilibiliPlayer({ id: dbVideo.id, title: dbVideo.title, speaker: dbVideo.speaker, bvid: bvid, source_url: dbVideo.source_url });
          }else if(!dbVideo.is_paid && (dbVideo.source_url || dbVideo.mp4_url)){
            // Free non-bilibili video: render with URL (only for free videos)
            titleEl.textContent = dbVideo.title || '（无标题）';
            metaEl.textContent = dbVideo.speaker ? ('主讲：' + dbVideo.speaker) : '';
            initUrlPlayer(dbVideo.mp4_url || dbVideo.source_url, 'mp4');
          }else if(token){
            // Paid video, API unavailable but user has token — try play-auth directly
            titleEl.textContent = dbVideo.title || '（无标题）';
            metaEl.textContent = dbVideo.speaker ? ('主讲：' + dbVideo.speaker) : '';
            await requestAndPlay(id, token, { title: dbVideo.title, speaker: dbVideo.speaker });
          }else{
            // Paid video, no token — show login prompt
            titleEl.textContent = dbVideo.title || '未找到该视频';
            metaEl.textContent = dbVideo.speaker ? ('主讲：' + dbVideo.speaker) : '';
            wrap.innerHTML = `<div class="note">该视频为付费内容，请<a href="login.html?next=${encodeURIComponent(location.href)}">登录</a>后观看。</div>`;
          }
        }else{
          titleEl.textContent = '未找到该视频';
          metaEl.textContent = '可能链接已更新或目录尚未同步。';
          wrap.innerHTML = `<div class="note">找不到视频：<code>${esc(id)}</code></div>`;
        }
      }
    }else if(accessData.error){
      showFatalError(accessData.error === 'video_not_published' ? '该视频尚未上架。' : accessData.message || accessData.error);
    }else{
      const video = accessData.video || {};
      const cat = getCategoryMeta(video.category);

      // Set page info
      titleEl.textContent = video.title || '（无标题）';
      const sp = (video.speaker || '').trim();
      metaEl.textContent = `频道：${cat ? (cat.zh + ' / ' + cat.en) : (video.category || '')}${sp ? (' · 主讲：' + sp) : ''}`;
      if(video.description){
        descEl.textContent = video.description;
        descEl.hidden = false;
      }

      // Set login button return URL
      if(loginBtn) loginBtn.href = `login.html?next=${encodeURIComponent(location.href)}`;

      if(accessData.needLogin){
        // ── Not logged in ──
        wrap.hidden = true;
        playerHint.hidden = true;
        loginGate.hidden = false;
        if(accessData.needPurchase){
          loginGate.querySelector('p').textContent = '登录后可购买并观看此视频。';
        }
      }else if(accessData.needPurchase){
        // ── Logged in but needs purchase ──
        wrap.hidden = true;
        playerHint.hidden = true;
        paidGate.hidden = false;

        const noteEl = document.getElementById('paidGateNote');
        const titleGate = document.getElementById('paidGateTitle');
        const msgEl = document.getElementById('paidGateMsg');
        const btnsEl = document.getElementById('paidGateBtns');

        if(video.membershipAccessible){
          noteEl.style.borderColor = 'rgba(168,85,247,.4)';
          noteEl.style.background = 'rgba(168,85,247,.06)';
          titleGate.textContent = '🔒 此视频为会员专属内容';
        }

        // Check pending orders
        let pendingHint = '';
        if(supabase && currentUser){
          try{
            const { data: pendingOrds } = await supabase
              .from('orders')
              .select('id,order_no,status')
              .eq('user_id', currentUser.id)
              .in('status', ['pending_payment','pending_review'])
              .limit(1);
            if(pendingOrds?.length > 0){
              pendingHint = `<p class="small muted" style="margin-top:8px">你有一笔待审核订单（${esc(pendingOrds[0].order_no)}），管理员审核通过后即可观看。</p>`;
            }
          }catch(_e){}
        }

        // Build buy buttons
        let btnsHtml = '';
        if(video.membershipAccessible){
          msgEl.innerHTML = `该视频为会员专属内容，开通会员后即可观看。${pendingHint}`;
          btnsHtml += `<a class="btn primary" href="checkout.html?product=MEMBERSHIP-YEARLY">开通会员 · ¥199/年</a>`;
        }else{
          const priceText = video.price > 0 ? `（¥${video.price}）` : '';
          msgEl.innerHTML = `该视频为付费内容${priceText}，购买后永久解锁。${pendingHint}`;
          if(video.productId){
            btnsHtml += `<a class="btn primary" href="checkout.html?product_id=${encodeURIComponent(video.productId)}">购买单集</a>`;
          }
          if(video.specialtyId && supabase){
            try{
              const { data: spec } = await supabase
                .from('specialties')
                .select('name, bundle_product_id')
                .eq('id', video.specialtyId)
                .maybeSingle();
              if(spec?.bundle_product_id){
                btnsHtml += `<a class="btn" href="checkout.html?product_id=${encodeURIComponent(spec.bundle_product_id)}">购买「${esc(spec.name || '专科整套课')}」整套课</a>`;
              }
            }catch(_e){}
          }
        }
        btnsHtml += `<a class="btn" href="my-learning.html">我的学习</a>`;
        btnsHtml += `<a class="btn" href="videos.html">返回视频库</a>`;
        btnsEl.innerHTML = btnsHtml;

      }else if(accessData.canPlay){
        // ── Can play! ──
        // For bilibili videos, render iframe directly (no play-auth needed)
        if(video.kind === 'bilibili' || video.bvid){
          renderBilibiliPlayer({
            id: video.id,
            title: video.title,
            speaker: video.speaker,
            bvid: video.bvid,
            source_url: '',
          });
        }else{
          // For aliyun/mp4/other videos, request play authorization
          await requestAndPlay(id, token, video);
        }
      }
    }
  }

  // ── Request play authorization and initialize player ──
  async function requestAndPlay(videoId, userToken, videoInfo){
    wrap.innerHTML = '<div class="note" style="text-align:center;padding:24px">正在获取播放授权…</div>';

    try{
      const res = await fetch(`/api/videos/${encodeURIComponent(videoId)}/play-auth`, {
        method: 'POST',
        headers: {
          Authorization: `Bearer ${userToken}`,
          'Content-Type': 'application/json',
        },
      });

      if(!res.ok){
        const err = await res.json().catch(() => ({}));
        if(res.status === 403){
          wrap.innerHTML = `<div class="note" style="border-color:rgba(255,120,120,.4)">权限验证失败：${esc(err.message || '无权播放')}。</div>`;
        }else if(res.status === 401){
          wrap.innerHTML = `<div class="note">登录已过期，请<a href="login.html?next=${encodeURIComponent(location.href)}">重新登录</a>。</div>`;
        }else{
          wrap.innerHTML = `<div class="note" style="border-color:rgba(255,120,120,.4)">获取播放授权失败：${esc(err.message || err.error || '未知错误')}。</div>`;
        }
        return;
      }

      const auth = await res.json();

      if(auth.playerType === 'aliyun_playauth'){
        // ── Aliyun PlayAuth mode ──
        // TODO: re-enable Aliplayer SDK with License for PlayAuth
        // For now, fall through to show message that PlayAuth needs Aliplayer License
        wrap.innerHTML = '<div class="note">阿里云 PlayAuth 模式暂不可用（需要配置播放器 License）。请在后台为该视频设置播放地址。</div>';
      }else if(auth.playerType === 'signed_url' || auth.playerType === 'direct_url'){
        // ── Signed URL / direct URL fallback ──
        initUrlPlayer(auth.playURL, auth.format || 'mp4');
      }else{
        wrap.innerHTML = `<div class="note" style="border-color:rgba(255,120,120,.4)">未知的播放方式：${esc(auth.playerType || 'unknown')}</div>`;
      }

    }catch(e){
      console.error('[watch] play-auth error:', e);
      wrap.innerHTML = `<div class="note" style="border-color:rgba(255,120,120,.4)">获取播放授权失败，请刷新重试。</div>`;
    }
  }

  // ── PlayAuth player placeholder (requires Aliplayer License) ──
  // TODO: re-enable when Aliplayer License is configured

  // ── Initialize player with temporary URL (native HTML5 video) ──
  function initUrlPlayer(url, format){
    if(!url){
      wrap.innerHTML = '<div class="note" style="border-color:rgba(255,120,120,.4)">没有可用的播放地址。</div>';
      return;
    }
    wrap.innerHTML = `<video controls playsinline style="width:100%;max-width:980px;height:560px;border-radius:16px;background:#000;border:1px solid rgba(255,255,255,.12)"><source src="${esc(url)}" type="video/${format || 'mp4'}" />你的浏览器不支持播放。</video>`;
  }

  // ── Render Bilibili player (for static free videos) ──
  function renderBilibiliPlayer(v){
    titleEl.textContent = v.title || '（无标题）';
    metaEl.textContent = v.speaker ? ('主讲：' + v.speaker) : '';

    let bvid = v.bvid || '';
    if(!bvid && v.source_url){
      const m = String(v.source_url).match(/\/video\/(BV[0-9A-Za-z]+)/i);
      if(m) bvid = m[1];
    }

    if(bvid){
      const isMobile = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
      if(isMobile){
        const biliUrl = `https://www.bilibili.com/video/${bvid}/`;
        wrap.innerHTML = `<div class="video-embed bili-mobile-card"><a href="${biliUrl}" target="_blank" rel="noopener" class="bili-mobile-link"><div class="bili-mobile-icon"><svg width="48" height="48" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="24" fill="rgba(0,161,214,.85)"/><polygon points="19,15 19,33 35,24" fill="#fff"/></svg></div><div class="bili-mobile-text">点击前往B站观看</div></a></div>`;
      }else{
        const src = `https://player.bilibili.com/player.html?bvid=${encodeURIComponent(bvid)}&page=1&high_quality=1&danmaku=0`;
        wrap.innerHTML = `<div class="video-embed"><iframe src="${src}" scrolling="no" border="0" frameborder="no" framespacing="0" allowfullscreen="true"></iframe></div>`;
      }
      openBtn.href = `https://www.bilibili.com/video/${bvid}/`;
      openBtn.textContent = '打开B站';
      openBtn.hidden = false;
    }else{
      wrap.innerHTML = `<div class="note">该视频缺少播放信息。<div style="margin-top:12px"><a class="btn" href="videos.html">返回视频目录</a></div></div>`;
    }
  }

  // Supabase demo mode hint
  if(!isConfigured()){
    toast('服务暂不可用', '系统正在维护中，请稍后再试。', 'err');
  }

  }catch(fatalErr){
    console.error('[watch] fatal error:', fatalErr);
    showFatalError(String(fatalErr?.message || fatalErr || '未知错误，请刷新重试。'));
  }

  } // end else (module path for non-static videos)
</script>
