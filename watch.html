<!-- ============================================================
     IMMEDIATE RENDERER: renders videos without ANY module imports,
     Supabase, or CDN dependencies. This ensures videos load even
     when the module script hangs/fails.
     Sources: 1) Static lookup  2) URL params (?bvid=...&src=...)
     ============================================================ -->
<script>
(function(){
  var STATIC_VIDEOS = {
    'glom-iga-2025-glassock':    { bvid:'BV1jjmZByEfu', title:'应对IgA肾病治疗的动态格局：2025', speaker:'Dr. Glassock' },
    'glom-ln-rovin':             { bvid:'BV1YNqSBXEkz', title:'狼疮肾病诊疗的前沿进展', speaker:'Dr. Brad Rovin' },
    'glom-tma-java':             { bvid:'BV1G2moBNE48', title:'TMA的诊疗进展', speaker:'Dr. Anuja Java' },
    'glom-fsgs-glassock':        { bvid:'BV19CmoBKELF', title:'FSGS的最新诊疗进展', speaker:'Dr. Glassock' },
    'glom-podocytopathy-rennke': { bvid:'BV19Wm2BuEej', title:'足细胞病', speaker:'Dr. Helmut G. Rennke' },
    'glom-amyloidosis-li':       { bvid:'BV1Qtm2BiEKS', title:'肾脏淀粉样变的最新进展', speaker:'李汀婷 教授' },
    'tx-pregnancy-josephson':    { bvid:'BV1nKmGB9EL1', title:'移植与妊娠：三部曲', speaker:'Dr. Josephson' },
    'path-mgrs-bijol':           { bvid:'BV1G4kmBbEsA', title:'MGRS的病理诊断', speaker:'Dr. Vanesa Bijol' },
    'tx-xenotransplant-cooper':  { bvid:'BV1epmZBzEnu', title:'异种肾移植的前沿进展', speaker:'Dr. David K.C. Cooper' },
    'path-basics-1-stillman':    { bvid:'BV1aqm8BxEba', title:'肾脏病理学基本原理 - Part 1', speaker:'Dr. Stillman' },
    'path-basics-2-stillman':    { bvid:'BV1aqm8BxEAs', title:'肾脏病理学基本原理 - Part 2', speaker:'Dr. Stillman' },
    'path-basics-3-stillman':    { bvid:'BV1aqm8BxE3b', title:'肾脏病理学基本原理 - Part 3', speaker:'Dr. Stillman' },
    'other-pkd-dahl':            { bvid:'BV1HAmGBdE1M', title:'多囊肾的最新诊断和治疗', speaker:'Dr. Dahl' },
  };

  function escHtml(s){ return String(s).replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }

  var qs = new URLSearchParams(location.search);
  var id = (qs.get('id') || '').toString();
  if(!id) return;

  // ── Resolve video data from multiple sources ──

  // 1) Static lookup
  var sv = STATIC_VIDEOS[id];

  // 2) URL params (set by videos.html links): ?bvid=XX&src=XX&t=XX&sp=XX
  var urlBvid = qs.get('bvid') || '';
  var urlSrc  = qs.get('src')  || '';
  var urlTitle = qs.get('t')   || '';
  var urlSpeaker = qs.get('sp') || '';

  // Merge: static data takes priority for bvid/title, URL params fill gaps
  var bvid    = (sv && sv.bvid)    || urlBvid || '';
  var title   = (sv && sv.title)   || urlTitle || '';
  var speaker = (sv && sv.speaker) || urlSpeaker || '';
  var srcUrl  = urlSrc || '';

  // If no bvid and no src, try extracting bvid from src URL
  if(!bvid && srcUrl){
    var m = srcUrl.match(/\/video\/(BV[0-9A-Za-z]+)/i);
    if(m) bvid = m[1];
  }

  // Nothing to render immediately — let module script handle it
  if(!bvid && !srcUrl) return;

  // Mark that the immediate renderer handled this video
  window.__watchRendered = true;

  var titleEl = document.getElementById('title');
  var metaEl  = document.getElementById('meta');
  var wrap    = document.getElementById('playerWrap');
  var openBtn = document.getElementById('openBili');

  if(titleEl) titleEl.textContent = title || '加载中…';
  if(metaEl)  metaEl.textContent  = speaker ? ('主讲：' + speaker) : '';

  if(bvid){
    // ── Bilibili embed ──
    var embedSrc = 'https://player.bilibili.com/player.html?bvid=' + encodeURIComponent(bvid) + '&page=1&high_quality=1&danmaku=0';
    if(wrap) wrap.innerHTML = '<div class="video-embed"><iframe src="' + embedSrc + '" scrolling="no" border="0" frameborder="no" framespacing="0" allowfullscreen="true"></iframe></div>';
    var biliUrl = 'https://www.bilibili.com/video/' + bvid + '/';
    if(openBtn){ openBtn.href = biliUrl; openBtn.textContent = '打开B站'; }
  }else if(srcUrl){
    // ── Aliyun / MP4 / external — render native <video> ──
    var isAliyun = /aliyuncs\.com|alicdn\.com|aliyun\.com/i.test(srcUrl);
    if(/\.mp4|\.m3u8|aliyuncs\.com|alicdn\.com/i.test(srcUrl)){
      if(wrap) wrap.innerHTML = '<video controls playsinline style="width:100%;max-width:980px;border-radius:16px;background:#000;border:1px solid rgba(255,255,255,.12)"><source src="' + escHtml(srcUrl) + '" type="video/mp4" />你的浏览器不支持播放。</video>';
    }else{
      if(wrap) wrap.innerHTML = '<div class="note">该视频为外部链接。<div style="margin-top:12px"><a class="btn primary" href="' + escHtml(srcUrl) + '" target="_blank" rel="noopener">打开来源观看</a></div></div>';
    }
    if(openBtn){
      openBtn.href = srcUrl;
      openBtn.textContent = isAliyun ? '打开视频源' : '打开来源链接';
    }
  }
})();
</script>

<!-- Timeout fallback: if module script hasn't rendered after 15s, show help -->
<script>
(function(){
  if(window.__watchRendered) return; // already rendered
  var timer = setTimeout(function(){
    if(window.__watchRendered) return;
    var titleEl = document.getElementById('title');
    var wrap = document.getElementById('playerWrap');
    if(titleEl && titleEl.textContent === '正在加载…'){
      titleEl.textContent = '加载超时';
      if(wrap) wrap.innerHTML = '<div class="note" style="border-color:rgba(255,160,80,.4);background:rgba(255,160,80,.06)">'
        + '<p>页面加载时间过长，可能是网络连接问题。</p>'
        + '<ul class="list" style="margin:8px 0 0">'
        + '<li>请刷新页面重试</li>'
        + '<li>检查网络连接是否正常</li>'
        + '<li>尝试使用无痕窗口或清理浏览器缓存</li>'
        + '<li>返回 <a href="videos.html">视频目录</a>，通过"打开B站"/"阿里云播放"等按钮在原始平台观看</li>'
        + '</ul></div>';
    }
  }, 15000);
  // Cancel if module renders in time
  window.__watchCancelTimeout = function(){ clearTimeout(timer); };
})();
</script>

<script type="module">
  import { supabase, ensureSupabase, ensureAuthed, isConfigured, getCurrentUser, toast } from './supabaseClient.js?v=20260128_030';
  import { getVideoById, getCategoryMeta } from './assets/videos.js?v=20260118_001';

  const titleEl = document.getElementById('title');
  const metaEl = document.getElementById('meta');
  const wrap = document.getElementById('playerWrap');
  const openBili = document.getElementById('openBili');

  function esc(s){
    return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  }

  function showFatalError(msg){
    titleEl.textContent = '加载失败';
    metaEl.textContent = '';
    wrap.innerHTML = `<div class="note" style="border-color:rgba(255,120,120,.4);background:rgba(255,120,120,.06)">
      <p>${esc(msg)}</p>
      <div style="margin-top:12px"><a class="btn" href="videos.html">返回视频目录</a></div>
    </div>`;
  }

  const qs = new URLSearchParams(location.search);
  const id = (qs.get('id') || '').toString();

  // Cancel the timeout fallback — module script is running
  if(typeof window.__watchCancelTimeout === 'function') window.__watchCancelTimeout();

  // If the immediate (non-module) renderer already handled this video, skip.
  if(window.__watchRendered){
    console.log('[watch] Video already rendered by immediate script, skipping module.');
    // Still do a soft auth check for nav avatar, but don't block
    ensureAuthed('login.html').catch(() => {});
  } else {

  try{

  // 1) Require login (matches "注册后观看") — with 10s timeout to prevent hang
  const authTimeout = new Promise((_, reject) => setTimeout(() => reject(new Error('auth_timeout')), 10000));
  try{
    await Promise.race([ensureAuthed('login.html'), authTimeout]);
  }catch(authErr){
    if(String(authErr?.message) === 'auth_timeout'){
      console.warn('[watch] ensureAuthed timed out after 10s, proceeding anyway');
    } else {
      throw authErr;
    }
  }

  /**
   * Check if an Aliyun OSS pre-signed URL has expired.
   * Pre-signed URLs contain an `Expires` query parameter (Unix epoch seconds).
   * Returns { expired: true, expiresAt: Date } or { expired: false }.
   */
  function checkAliyunUrlExpiry(url){
    if(!url) return { expired: false };
    try{
      const u = new URL(url);
      const exp = u.searchParams.get('Expires');
      if(!exp) return { expired: false }; // No expiry = permanent or CDN URL
      const expiresAt = new Date(Number(exp) * 1000);
      if(isNaN(expiresAt.getTime())) return { expired: false };
      return { expired: expiresAt.getTime() < Date.now(), expiresAt };
    }catch{ return { expired: false }; }
  }

  function renderExpiredMessage(expiresAt){
    const ts = expiresAt ? expiresAt.toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' }) : '未知';
    return `
      <div class="note" style="border-color:rgba(255,120,120,.4);background:rgba(255,120,120,.06)">
        <h3 style="margin:0 0 8px">视频链接已过期</h3>
        <p>该视频使用的阿里云临时播放地址已于 <b>${esc(ts)}</b> 过期。</p>
        <p class="small muted" style="margin-top:8px">
          <b>管理员请注意：</b>阿里云 OSS 签名 URL 会在指定时间后过期。建议：<br/>
          ① 在阿里云控制台重新获取播放地址，并在管理后台更新该视频的链接；<br/>
          ② 如需长期有效链接，建议使用 CDN 加速域名 或 开启 Bucket 公共读取。
        </p>
        <div style="margin-top:14px;display:flex;gap:10px;flex-wrap:wrap">
          <a class="btn" href="videos.html">返回视频目录</a>
        </div>
      </div>
    `;
  }

  if(!id){
    titleEl.textContent = '视频参数缺失';
    metaEl.textContent = '请从视频目录进入。';
    wrap.innerHTML = `<div class="note">缺少参数：<code>id</code></div>`;
  }else{
    // 1) Static list
    let v = getVideoById(id);

    // 2) DB list (admin added videos) - scheme 2
    if(!v && isConfigured()){
      try{
        await ensureSupabase();
        if(supabase){
          let { data, error } = await supabase
            .from('learning_videos')
            .select('id,title,category,kind,source_url,mp4_url,bvid,aliyun_vid,speaker,created_at,enabled,deleted_at,is_paid,specialty_id,product_id')
            .eq('id', id)
            .maybeSingle();
          // Backward compat: retry without newer columns if they don't exist yet
          if(error && /aliyun_vid|is_paid|specialty_id|product_id|speaker/i.test(String(error.message || ''))){
            const r2 = await supabase
              .from('learning_videos')
              .select('id,title,category,kind,source_url,mp4_url,bvid,created_at,enabled,deleted_at')
              .eq('id', id)
              .maybeSingle();
            data = r2.data;
            error = r2.error;
          }
          if(!error && data && !data.deleted_at && data.enabled !== false){
            v = {
              id: String(data.id),
              title: data.title || '',
              category: data.category || 'other',
              kind: data.kind || (data.bvid ? 'bilibili' : (data.mp4_url ? 'mp4' : 'external')),
              bvid: data.bvid || null,
              aliyun_vid: data.aliyun_vid || null,
              speaker: data.speaker || '',
              source_url: data.source_url || data.mp4_url || '',
              mp4_url: data.mp4_url || null,
              is_paid: data.is_paid || false,
              specialty_id: data.specialty_id || null,
              product_id: data.product_id || null,
            };
          }
        }
      }catch(_e){
        // ignore
      }
    }

    if(!v){
      titleEl.textContent = '未找到该视频';
      metaEl.textContent = '可能链接已更新或目录尚未同步。';
      wrap.innerHTML = `<div class="note">找不到视频：<code>${esc(id)}</code></div>`;
    }else{

      // ── Paid video access check ──────────────────────────────
      // Static videos (from assets/videos.js) are always free.
      // DB videos with is_paid=true require an entitlement check.
      if(v.is_paid && isConfigured() && supabase){
        try{
          const user = await getCurrentUser();
          if(user){
            const { data: hasAccess, error: accErr } = await supabase.rpc('check_video_access', {
              p_user_id: user.id,
              p_video_id: v.id,
              p_specialty_id: v.specialty_id || null,
            });
            if(!accErr && hasAccess === false){
              // No access — show purchase gate and block player
              const gateEl   = document.getElementById('paidGate');
              const msgEl    = document.getElementById('paidGateMsg');
              const btnsEl   = document.getElementById('paidGateBtns');
              gateEl.hidden  = false;
              wrap.hidden    = true;

              // Check if user has a pending order for this video/specialty
              let pendingHint = '';
              const { data: pendingOrds } = await supabase
                .from('orders')
                .select('id,order_no,status')
                .eq('user_id', user.id)
                .in('status', ['pending_payment','pending_review'])
                .limit(1);
              if(pendingOrds && pendingOrds.length > 0){
                pendingHint = `<p class="small muted" style="margin-top:8px">你有一笔待审核订单（${esc(pendingOrds[0].order_no)}），管理员审核通过后即可观看。</p>`;
              }
              msgEl.innerHTML = `该视频为付费内容，购买后永久解锁。${pendingHint}`;

              // Build buy buttons
              let btnsHtml = '';
              if(v.product_id){
                btnsHtml += `<a class="btn primary" href="checkout.html?product_id=${encodeURIComponent(v.product_id)}">购买单集</a>`;
              }
              if(v.specialty_id){
                // Fetch the bundle product for this specialty
                const { data: spec } = await supabase
                  .from('specialties')
                  .select('name, bundle_product_id')
                  .eq('id', v.specialty_id)
                  .maybeSingle();
                if(spec?.bundle_product_id){
                  btnsHtml += `<a class="btn" href="checkout.html?product_id=${encodeURIComponent(spec.bundle_product_id)}">购买「${esc(spec.name || '专科整套课')}」整套课</a>`;
                }
              }
              btnsHtml += `<a class="btn" href="my-learning.html">我的学习</a>`;
              btnsHtml += `<a class="btn" href="videos.html">返回视频库</a>`;
              btnsEl.innerHTML = btnsHtml;
              // Skip rendering the player
              if(!isConfigured()) toast('服务暂不可用', '', 'err');
              return; // <-- stop here, do not render player
            }
          }
        }catch(e){
          // On check failure, allow playback (fail-open for better UX,
          // real protection is via DB RLS + storage policies)
          console.warn('check_video_access error:', e);
        }
      }
      // ── End paid check ───────────────────────────────────────

      // Auto-detect aliyun URLs regardless of stored kind
      function isAliyunUrl(url){
        if(!url) return false;
        return /aliyuncs\.com|alicdn\.com|aliyun\.com/i.test(url);
      }
      let kind = v.kind || (v.bvid ? 'bilibili' : (v.mp4_url ? 'mp4' : 'external'));
      if(kind !== 'aliyun' && (isAliyunUrl(v.source_url) || isAliyunUrl(v.mp4_url))){
        kind = 'aliyun';
      }
      const cat = getCategoryMeta(v.category);
      titleEl.textContent = v.title || '（无标题）';
      const sp = String(v.speaker || '').trim();
      metaEl.textContent = `频道：${cat ? (cat.zh + ' / ' + cat.en) : (v.category || '')}${sp ? (' · 主讲：' + sp) : ''}`;

      // Open button — only set href if it looks like a real URL
      const openUrl = v.mp4_url || v.source_url || '';
      const isValidUrl = /^https?:\/\//i.test(openUrl);
      if(isValidUrl){
        openBili.href = openUrl;
      }else{
        openBili.href = 'javascript:void(0)';
        openBili.title = '无可用链接';
      }
      openBili.textContent = (kind === 'aliyun') ? '打开视频源' : (kind === 'mp4') ? '打开视频文件' : (kind === 'external' ? '打开来源链接' : '打开B站');

      // Check for expired Aliyun pre-signed URLs before attempting playback
      const playUrl = v.mp4_url || v.source_url || openUrl;
      const expiry = checkAliyunUrlExpiry(playUrl);
      if(expiry.expired){
        wrap.innerHTML = renderExpiredMessage(expiry.expiresAt);
        // hide the open button too since the URL is expired
        openBili.style.display = 'none';
      }else if(kind === 'aliyun'){
        // Alibaba Cloud VOD — use Aliplayer SDK with source URL
        const aliSource = v.mp4_url || v.source_url || openUrl;
        wrap.innerHTML = '<div id="aliyun-player" style="width:100%;max-width:980px;border-radius:16px;overflow:hidden;background:#000;border:1px solid rgba(255,255,255,.12)"></div>';

        function showPlayerError(){
          var el = document.getElementById('aliyun-player');
          if(el) el.innerHTML = renderExpiredMessage(checkAliyunUrlExpiry(aliSource).expiresAt || new Date());
        }

        function initAliplayer(){
          var player = new Aliplayer({
            id: 'aliyun-player',
            source: aliSource,
            width: '100%',
            height: '560px',
            autoplay: false,
            isLive: false,
            controlBarVisibility: 'hover',
            skinLayout: [
              { name: 'bigPlayButton', align: 'cc' },
              { name: 'H5Loading', align: 'cc' },
              { name: 'controlBar', align: 'blabs', x: 0, y: 0, children: [
                { name: 'progress', align: 'blabs', x: 0, y: 44 },
                { name: 'playButton', align: 'tl', x: 15, y: 12 },
                { name: 'timeDisplay', align: 'tl', x: 10, y: 7 },
                { name: 'fullScreenButton', align: 'tr', x: 10, y: 12 },
                { name: 'volume', align: 'tr', x: 5, y: 10 },
              ]}
            ]
          });
          if(player && typeof player.on === 'function'){
            player.on('error', function(){ showPlayerError(); });
          }
        }

        function fallbackPlayer(){
          var el = document.getElementById('aliyun-player');
          if(!el) return;
          el.innerHTML = '<video controls playsinline style="width:100%;height:560px;background:#000"><source src="' + esc(aliSource) + '" type="video/mp4" />你的浏览器不支持播放。</video>';
          var vid = el.querySelector('video');
          if(vid) vid.addEventListener('error', function(){ showPlayerError(); });
        }

        if(typeof Aliplayer !== 'undefined'){
          initAliplayer();
        }else{
          // SDK still loading (async) — wait up to 8s then fallback
          var waited = 0;
          var timer = setInterval(function(){
            waited += 200;
            if(typeof Aliplayer !== 'undefined'){
              clearInterval(timer);
              initAliplayer();
            }else if(waited >= 8000){
              clearInterval(timer);
              fallbackPlayer();
            }
          }, 200);
        }
      }else if(kind === 'mp4'){
        wrap.innerHTML = `
          <video controls playsinline style="width:100%;max-width:980px;border-radius:16px;background:#000;border:1px solid rgba(255,255,255,.12)">
            <source src="${esc(openUrl)}" type="video/mp4" />
            你的浏览器不支持 MP4 播放。
          </video>
        `;
        {
          const vid = wrap.querySelector('video');
          if(vid) vid.addEventListener('error', function(){
            const ex = checkAliyunUrlExpiry(openUrl);
            if(ex.expired) wrap.innerHTML = renderExpiredMessage(ex.expiresAt);
            else wrap.innerHTML = '<div class="note" style="border-color:rgba(255,120,120,.4)">视频加载失败，请刷新页面重试或联系管理员。</div>';
          });
        }
      }else if(kind === 'external'){
        wrap.innerHTML = `
          <div class="note">
            该视频为外部链接，平台可能不允许直接嵌入播放。
            <div style="margin-top:12px">
              <a class="btn primary" href="${esc(openUrl)}" target="_blank" rel="noopener">打开来源观看</a>
            </div>
          </div>
        `;
      }else{
        // Official Bilibili embed
        let bvid = v.bvid || '';
        if(!bvid && openUrl){
          const m = String(openUrl).match(/\/video\/(BV[0-9A-Za-z]+)/i);
          if(m) bvid = m[1];
        }

        if(!bvid){
          wrap.innerHTML = `
            <div class="note">
              该视频缺少 BV 号，无法嵌入播放。
              <div style="margin-top:12px">
                <a class="btn primary" href="${esc(openUrl)}" target="_blank" rel="noopener">打开B站观看</a>
              </div>
            </div>
          `;
        }else{
          const src = `https://player.bilibili.com/player.html?bvid=${encodeURIComponent(bvid)}&page=1&high_quality=1&danmaku=0`;
          wrap.innerHTML = `
            <div class="video-embed">
              <iframe
                src="${src}"
                scrolling="no"
                border="0"
                frameborder="no"
                framespacing="0"
                allowfullscreen="true"
              ></iframe>
            </div>
          `;
        }
      }
    }
  }

  // Supabase demo mode hint
  if(!isConfigured()){
    toast('服务暂不可用', '当前服务尚未完成初始化或配置，请联系管理员。', 'err');
  }

  }catch(fatalErr){
    console.error('[watch] fatal error:', fatalErr);
    showFatalError(String(fatalErr?.message || fatalErr || '未知错误，请刷新重试。'));
  }

  } // end else (module path for non-static videos)
</script>

  </main>
