server {
    listen 80;
    server_name kidneysphere.com www.kidneysphere.com;

    # 备案后阿里云要求：HTTP 先可用，之后再配 HTTPS
    root /var/www/kidneysphere;
    index index.html;

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|pdf)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # HTML 不缓存（确保用户看到最新版）
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA 风格 fallback（如果需要）
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # 禁止访问隐藏文件和 SQL 文件
    location ~ /\. { deny all; }
    location ~* \.(sql|md|py|toml)$ { deny all; }
}
